<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<style>
body { font-family: Arial; padding: 20px; background: #f5f5f5; }
.container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
h1 { color: #333; }
select, button { padding: 10px; margin: 10px 0; font-size: 14px; }
button { background: #2D6A4F; color: white; border: none; cursor: pointer; border-radius: 4px; }
button:hover { background: #1E5038; }
button:disabled { background: #ccc; cursor: not-allowed; }
button.preview { background: #2A6096; }
button.preview:hover { background: #1E4070; }
button.delete { background: #dc3545; }
button.delete:hover { background: #c82333; }
button.save { background: #28a745; }
button.save:hover { background: #218838; }
#status { padding: 15px; margin: 15px 0; border-radius: 4px; display: none; font-weight: bold; font-size: 16px; }
#status.loading { background: #e3f2fd; color: #1565c0; display: block; }
#status.success { background: #d4edda; color: #155724; display: block; }
#status.error { background: #f8d7da; color: #721c24; display: block; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #1565c0; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.drafts { margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd; }
.draft-item { padding: 12px; border: 1px solid #ddd; margin: 10px 0; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.draft-info { flex: 1; min-width: 200px; }
.draft-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.draft-buttons button { margin: 0; padding: 8px 12px; font-size: 13px; }

/* MODAL */
.modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
.modal.active { display: flex; align-items: center; justify-content: center; }
.modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 800px; max-height: 85vh; overflow-y: auto; width: 90%; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-close { font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
.modal-close:hover { color: #000; }
.modal-buttons { display: flex; gap: 10px; }
.modal-buttons button { padding: 8px 16px; font-size: 13px; margin: 0; }
.preview-header { margin-bottom: 20px; border-bottom: 2px solid #2D6A4F; padding-bottom: 15px; }
.preview-city { font-size: 24px; font-weight: 700; color: #2D6A4F; }
.preview-week { font-size: 13px; color: #7A7A7A; margin-top: 5px; }
.preview-greeting { font-size: 18px; font-weight: 600; margin: 20px 0 10px 0; }
.preview-section { margin: 20px 0; padding: 15px; background: #f9f9f9; border-left: 4px solid #2D6A4F; }
.preview-section-title { font-weight: 600; color: #2D6A4F; margin-bottom: 10px; font-size: 13px; text-transform: uppercase; }
.preview-item { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #ddd; }
.preview-item:last-child { border-bottom: none; }
.preview-item-name { font-weight: 600; color: #1A1A1A; margin-bottom: 4px; }
.preview-item-address { font-size: 12px; color: #7A7A7A; font-style: italic; margin-bottom: 4px; }
.preview-item-body { font-size: 13px; line-height: 1.6; color: #3D3D3D; }

/* EDIT MODE */
.edit-mode { border: 2px dashed #2D6A4F; padding: 10px; background: #f0f8f5; border-radius: 4px; margin-bottom: 10px; }
.edit-field { margin-bottom: 10px; }
.edit-field label { display: block; font-weight: 600; font-size: 12px; color: #2D6A4F; margin-bottom: 4px; }
.edit-field input, .edit-field textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: Arial; font-size: 13px; }
.edit-field textarea { resize: vertical; min-height: 60px; }
.preview-item-image { max-width: 100%; height: auto; border-radius: 4px; margin-bottom: 10px; max-height: 300px; }
.edit-item-image-preview { max-width: 150px; max-height: 150px; border-radius: 4px; margin-bottom: 8px; border: 1px solid #ddd; }
</style>
</head>
<body>

<div class="container">
<h1>San Tan Family Pulse - Admin</h1>

<div>
  <label>City:</label><br>
  <select id="city">
    <option>Gilbert</option>
    <option>Chandler</option>
    <option>Queen Creek</option>
    <option>San Tan Valley</option>
  </select>
</div>

<button id="btn">Generate Draft</button>
<div id="status"></div>

<div class="drafts">
  <h2>Drafts:</h2>
  <div id="drafts">Loading...</div>
</div>

</div>

<!-- PREVIEW MODAL -->
<div id="preview-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span></span>
      <div class="modal-buttons">
        <button id="edit-toggle" class="preview" onclick="toggleEditMode()">✏️ Edit</button>
        <span class="modal-close" onclick="closePreview()">&times;</span>
      </div>
    </div>
    <div id="preview-content"></div>
  </div>
</div>

<script>
let currentDraftId = null;
let currentData = null;
let editMode = false;

document.getElementById('btn').addEventListener('click', async function() {
  const city = document.getElementById('city').value;
  const status = document.getElementById('status');
  const btn = document.getElementById('btn');
  
  btn.disabled = true;
  status.innerHTML = '<div class="spinner"></div>Generating newsletter for ' + city + '... (this may take 30-60 seconds)';
  status.className = 'loading';
  
  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ city: city })
    });
    
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Failed');
    }
    
    status.textContent = '✅ Draft generated! Scroll down to see it.';
    status.className = 'success';
    loadDrafts();
  } catch (e) {
    status.textContent = '❌ Error: ' + e.message;
    status.className = 'error';
  } finally {
    btn.disabled = false;
  }
});

async function loadDrafts() {
  try {
    const res = await fetch('/api/editions');
    const editions = await res.json();
    if (!editions || editions.length === 0) {
      document.getElementById('drafts').innerHTML = 'No drafts yet';
      return;
    }
    document.getElementById('drafts').innerHTML = editions.map(e => 
      `<div class="draft-item">
        <div class="draft-info">
          <strong>${e.city}</strong> - Week of ${e.week_of}
        </div>
        <div class="draft-buttons">
          <button class="preview" onclick="previewDraft(${e.id})">👁️ Preview</button>
          <button onclick="publish(${e.id})">✓ Publish</button>
          <button class="delete" onclick="deleteDraft(${e.id})">🗑️ Delete</button>
        </div>
      </div>`
    ).join('');
  } catch (e) {
    document.getElementById('drafts').innerHTML = 'Error: ' + e.message;
  }
}

async function previewDraft(id) {
  try {
    editMode = false;
    currentDraftId = id;
    const res = await fetch('/api/editions/' + id);
    const data = await res.json();
    currentData = JSON.parse(JSON.stringify(data));
    renderPreview(data, false);
    document.getElementById('preview-modal').classList.add('active');
    document.getElementById('edit-toggle').textContent = '✏️ Edit';
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function renderPreview(data, edit) {
  const sections = [
    { key: 'events', title: '📅 Events This Week', items: data.events },
    { key: 'dining', title: '🍽️ Food & Restaurant News', items: data.dining },
    { key: 'activities', title: '🏃 Things to Do with Kids', items: data.activities },
    { key: 'community', title: '🏡 Around the Neighborhood', items: data.community }
  ];

  let html = `
    <div class="preview-header">
      <div class="preview-city">Good morning, ${esc(data.city)}! 👋</div>
      <div class="preview-week">Week of ${esc(data.week_of)}</div>
    </div>
  `;

  if (edit) {
    html += `<div class="edit-mode">
      <div class="edit-field">
        <label>Greeting:</label>
        <textarea id="greeting-edit">${esc(data.greeting)}</textarea>
      </div>
      <div class="edit-field">
        <label>Weather:</label>
        <input type="text" id="weather-edit" value="${esc(data.weather || '')}">
      </div>
    </div>`;
  } else {
    html += `<div class="preview-greeting">${esc(data.greeting)}</div>`;
  }

  if (data.weather && !edit) {
    html += `<div style="background: #EDF3FA; padding: 12px; border-radius: 4px; margin-bottom: 15px; color: #2A6096; font-size: 13px;">☀️ ${esc(data.weather)}</div>`;
  }

  sections.forEach(s => {
    if (s.items && s.items.length) {
      html += `<div class="preview-section">
        <div class="preview-section-title">${s.title}</div>`;
      s.items.forEach((item, idx) => {
        if (edit) {
          html += `<div class="preview-item edit-mode">
            <div class="edit-field">
              <label>Name:</label>
              <input type="text" class="item-name-edit" data-section="${s.key}" data-index="${idx}" value="${esc(item.name)}">
            </div>
            <div class="edit-field">
              <label>Address:</label>
              <input type="text" class="item-address-edit" data-section="${s.key}" data-index="${idx}" value="${esc(item.address || '')}">
            </div>
            <div class="edit-field">
              <label>URL:</label>
              <input type="text" class="item-url-edit" data-section="${s.key}" data-index="${idx}" value="${esc(item.url || '')}">
            </div>
            <div class="edit-field">
              <label>Image URL:</label>
              <input type="text" class="item-image-edit" data-section="${s.key}" data-index="${idx}" value="${esc(item.image || '')}">
              ${item.image ? `<img src="${esc(item.image)}" alt="preview" class="edit-item-image-preview" onerror="this.style.display='none'">` : ''}
            </div>
            <div class="edit-field">
              <label>Description:</label>
              <textarea class="item-body-edit" data-section="${s.key}" data-index="${idx}">${esc(item.body)}</textarea>
            </div>
          </div>`;
        } else {
          html += `<div class="preview-item">
            ${item.image ? `<img src="${esc(item.image)}" alt="${esc(item.name)}" class="preview-item-image" onerror="this.style.display='none'">` : ''}
            <div class="preview-item-name">${esc(item.name)}</div>`;
          if (item.address) {
            html += `<div class="preview-item-address">${esc(item.address)}</div>`;
          }
          html += `<div class="preview-item-body">${esc(item.body)}</div>
            </div>`;
        }
      });
      html += `</div>`;
    }
  });

  if (edit) {
    html += `<div style="margin-top: 20px;">
      <button class="save" onclick="saveEdits()">💾 Save Changes</button>
      <button onclick="toggleEditMode()" style="background: #6c757d;">Cancel</button>
    </div>`;
  }

  document.getElementById('preview-content').innerHTML = html;
}

function toggleEditMode() {
  editMode = !editMode;
  if (editMode) {
    renderPreview(currentData, true);
    document.getElementById('edit-toggle').textContent = '👁️ Preview';
  } else {
    renderPreview(currentData, false);
    document.getElementById('edit-toggle').textContent = '✏️ Edit';
  }
}

function saveEdits() {
  // Gather all edits
  currentData.greeting = document.getElementById('greeting-edit').value;
  currentData.weather = document.getElementById('weather-edit').value;

  const sections = ['events', 'dining', 'activities', 'community'];
  sections.forEach(section => {
    const names = document.querySelectorAll(`.item-name-edit[data-section="${section}"]`);
    names.forEach((el, idx) => {
      currentData[section][idx].name = el.value;
      currentData[section][idx].address = document.querySelector(`.item-address-edit[data-section="${section}"][data-index="${idx}"]`).value;
      currentData[section][idx].url = document.querySelector(`.item-url-edit[data-section="${section}"][data-index="${idx}"]`).value;
      currentData[section][idx].image = document.querySelector(`.item-image-edit[data-section="${section}"][data-index="${idx}"]`).value;
      currentData[section][idx].body = document.querySelector(`.item-body-edit[data-section="${section}"][data-index="${idx}"]`).value;
    });
  });

  // Save to database
  fetch(`/api/editions/${currentDraftId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(currentData)
  }).then(() => {
    alert('✅ Changes saved!');
    editMode = false;
    renderPreview(currentData, false);
    document.getElementById('edit-toggle').textContent = '✏️ Edit';
  }).catch(e => alert('Error: ' + e.message));
}

function closePreview() {
  document.getElementById('preview-modal').classList.remove('active');
  editMode = false;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function publish(id) {
  fetch(`/api/editions/${id}/publish`, { method: 'POST' })
    .then(() => { alert('Published!'); loadDrafts(); closePreview(); })
    .catch(e => alert('Error: ' + e.message));
}

function deleteDraft(id) {
  if (!confirm('Delete this draft?')) return;
  fetch(`/api/editions/${id}`, { method: 'DELETE' })
    .then(() => { alert('Deleted!'); loadDrafts(); })
    .catch(e => alert('Error: ' + e.message));
}

loadDrafts();
</script>

</body>
</html>
